<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전북의대 관현악단 시스템 포털</title>
  <style>
    body {
      background-color: #05140e;
      color: #f4efeb;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
      padding: 20px;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 35px;
      color: #d4af37;
      letter-spacing: 0.05em;
    }

    .btn {
      display: block;
      background: linear-gradient(135deg, #d4af37 0%, #aa7c11 100%);
      color: #05140e;
      text-decoration: none;
      padding: 16px;
      margin: 16px 0;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
    }

    .btn:hover {
      transform: scale(1.02);
    }

    .admin {
      background: #172338;
      color: #ffffff;
      font-size: 0.85rem;
      margin-top: 40px;
      box-shadow: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>JBNU MEDICINE ORCHESTRA</h1>
    <a href="https://froggyjuice.github.io/ticket-copy/" class="btn">🎵 제37회 정기연주회 디지털 팜플렛</a>
    <a href="https://jbnu-orchestra.web.app" class="btn">🎫 실시간 좌석 예매 및 티켓 발권</a>
    <a href="https://jbnu-orchestra.web.app/#admin" class="btn admin">🛠️ 운영진 전용 관리자 시스템</a>
  </div>
</body>

</html>
